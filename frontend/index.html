<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NER Lab · Vietnamese Named Entity Recognition</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink-0:#1a1a1a; --ink-1:#555555; --ink-2:#888888; --ink-3:#aaaaaa;
  --s0:#ffffff; --s1:#f8f9fa; --s2:#f0f2f5; --s3:#e8eaed; --s4:#e0e2e7;
  --line:rgba(0,0,0,.08); --line2:rgba(0,0,0,.12);
  --blue:#2563eb; --violet:#7c3aed; --cyan:#0891b2;
  --amber:#d97706; --emerald:#059669; --rose:#be185d;
  --orange:#ea580c; --lime:#84cc16; --pink:#db2777; --teal:#0d9488;
  --fh:'Outfit',sans-serif; --fb:'Space Grotesk',sans-serif; --fm:'Space Mono',monospace;
  --r:12px; --rs:7px; --rp:999px;
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{background:var(--s0);color:var(--ink-0);font-family:var(--fb);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* AMBIENT */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(130px);opacity:.05}
.b1{width:700px;height:700px;background:radial-gradient(#2563eb,#7c3aed);top:-250px;left:-150px;animation:d1 20s ease-in-out infinite}
.b2{width:500px;height:500px;background:radial-gradient(#0891b2,#2563eb);bottom:-200px;right:-100px;animation:d2 25s ease-in-out infinite}
.b3{width:280px;height:280px;background:#7c3aed;top:45%;left:55%;opacity:.04;animation:d3 17s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(80px,50px) rotate(15deg)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-40px)}}
@keyframes d3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}
.bg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px);background-size:72px 72px}

/* SHELL */
.shell{position:relative;z-index:1;max-width:1340px;margin:0 auto;padding:0 28px 100px}

/* HEADER */
.hdr{padding:38px 0 30px;display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--line2);margin-bottom:44px}
.hdr-logo{width:46px;height:46px;flex-shrink:0;position:relative}
.hdr-logo-bg{position:absolute;inset:0;border-radius:13px;background:linear-gradient(135deg,rgba(37,99,235,.15),rgba(124,58,237,.15));border:1px solid rgba(37,99,235,.3)}
.hdr-logo-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:11px;font-weight:700;color:var(--blue);line-height:1;text-align:center}
.hdr-title{font-family:var(--fh);font-size:27px;font-weight:900;letter-spacing:-1px;background:linear-gradient(130deg,var(--ink-0) 40%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-size:13px;color:var(--ink-2);margin-top:3px;font-weight:400}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 11px;border-radius:var(--rp);border:1px solid var(--line2);background:var(--s2);color:var(--ink-3)}
.pill.live{color:var(--emerald);border-color:rgba(5,150,105,.3);background:rgba(5,150,105,.08)}

/* INPUT CARD */
.icard{background:var(--s1);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;margin-bottom:16px;transition:border-color .25s,box-shadow .25s}
.icard:focus-within{border-color:rgba(37,99,235,.6);box-shadow:0 0 0 3px rgba(37,99,235,.08),0 8px 40px rgba(37,99,235,.12)}
.icard-top{padding:20px 20px 0}
.ieyebrow{font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
textarea{width:100%;min-height:96px;max-height:200px;background:transparent;border:none;outline:none;resize:none;padding:0 0 16px;font-family:var(--fm);font-size:14px;color:var(--ink-0);line-height:1.8;caret-color:var(--blue)}
textarea::placeholder{color:var(--ink-3)}
.icard-bot{display:flex;align-items:center;gap:10px;padding:10px 20px;border-top:1px solid var(--line)}
.char-c{font-family:var(--fm);font-size:10px;color:var(--ink-3);white-space:nowrap;margin-left:auto}

/* CONTROLS */
.ctrl{display:flex;align-items:center;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.btn-run{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--fh);font-size:14px;font-weight:700;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;box-shadow:0 4px 20px rgba(37,99,235,.2),0 1px 3px rgba(0,0,0,.1);transition:all .2s;position:relative;overflow:hidden}
.btn-run::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#3b82f6,#8b5cf6);opacity:0;transition:opacity .2s}
.btn-run:hover::after{opacity:1}
.btn-run:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,99,235,.25)}
.btn-run:active{transform:translateY(0)}
.btn-run:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-run > *{position:relative;z-index:1}
.btn-ghost{display:inline-flex;align-items:center;gap:7px;padding:12px 18px;border-radius:var(--rs);cursor:pointer;font-family:var(--fh);font-size:14px;font-weight:600;background:var(--s2);border:1px solid var(--line2);color:var(--ink-2);transition:all .18s}
.btn-ghost:hover{background:var(--s3);color:var(--ink-0)}
.mode-p{margin-left:auto;font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.4px;padding:5px 12px;border-radius:var(--rp);background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.25);color:var(--emerald)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:6px;padding:14px 18px;background:var(--s1);border:1px solid var(--line);border-radius:var(--r);margin-bottom:28px}
.leg{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:4px 10px;border-radius:var(--rp);border:1px solid;transition:opacity .15s}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* PROGRESS */
.progress{height:1px;overflow:hidden;margin-bottom:28px;display:none;background:linear-gradient(90deg,transparent,rgba(37,99,235,.12),transparent)}
.progress.on{display:block}
.progress::after{content:'';display:block;height:100%;width:30%;background:linear-gradient(90deg,transparent,var(--blue),var(--violet),transparent);animation:beam 1.3s ease-in-out infinite}
@keyframes beam{0%{transform:translateX(-350%)}100%{transform:translateX(600%)}}

/* RESULTS */
.rgrid{display:grid;grid-template-columns:1fr;gap:20px}
.panel{background:var(--s1);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;opacity:0;transform:translateY(18px) scale(.985);transition:opacity .45s cubic-bezier(.16,1,.3,1),transform .45s cubic-bezier(.16,1,.3,1)}
.panel.show{opacity:1;transform:translateY(0) scale(1)}
.panel#p2.show{transition-delay:.12s}

.pstripe{height:2px;background:linear-gradient(90deg,#2563eb,#7c3aed,#0891b2)}
.phead{padding:15px 20px 13px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.pnum{font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:rgba(37,99,235,.12);color:var(--blue);border:1px solid rgba(37,99,235,.22)}
.pname{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--ink-0)}
.plat{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--ink-3)}

.pbody{padding:22px 20px;flex:1;min-height:118px}
.tflow{display:flex;flex-wrap:wrap;gap:8px 6px;align-items:center}

@keyframes cin{to{opacity:1;transform:translateY(0)}}
.tok-o{font-family:var(--fm);font-size:13px;color:var(--ink-2);white-space:nowrap;opacity:0;transform:translateY(6px);animation:cin .3s cubic-bezier(.16,1,.3,1) forwards}
.chunk{display:inline-flex;flex-direction:column;align-items:flex-start;gap:5px;padding:7px 12px 8px;border-radius:9px;border:1px solid;opacity:0;transform:translateY(8px);animation:cin .35s cubic-bezier(.16,1,.3,1) forwards;position:relative}
.chunk::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;border-radius:2px;background:currentColor;opacity:.45}
.chunk-lbl{font-family:var(--fm);font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;opacity:.8}
.chunk-words{display:flex;flex-wrap:wrap;gap:3px 6px}
.chunk-word{font-family:var(--fm);font-size:13px;font-weight:500;white-space:nowrap}

.pfoot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:20px;flex-wrap:wrap}
.st{display:flex;flex-direction:column;gap:2px}
.sk{font-family:var(--fm);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-3)}
.sv{font-family:var(--fm);font-size:13px;font-weight:700;color:var(--ink-1)}
.sv.b{color:var(--blue)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:42px 20px}
.eicon{width:40px;height:40px;border-radius:10px;background:var(--s2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:11px}
.empty p{font-size:13px;color:var(--ink-3);text-align:center;max-width:230px}
.empty strong{color:var(--ink-2)}

.error{padding:12px 16px;background:rgba(255,94,142,.08);border:1px solid rgba(255,94,142,.28);border-radius:var(--r);color:var(--rose);font-size:13px;margin-bottom:20px}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--s4)}
</style>
</head>
<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="shell">

  <header class="hdr">
    <div class="hdr-logo">
      <div class="hdr-logo-bg"></div>
      <div class="hdr-logo-txt">NER</div>
    </div>
    <div>
      <div class="hdr-title">NER Lab</div>
      <div class="hdr-sub">Vietnamese Named Entity Recognition</div>
    </div>
    <div class="hdr-right">
      <span class="pill live" id="pill">✓ Live Model</span>
    </div>
  </header>

  <div class="icard">
    <div class="icard-top">
      <div class="ieyebrow">📝 Input Text</div>
      <textarea id="txt" placeholder="Nhập văn bản tiếng Việt..." spellcheck="false"></textarea>
    </div>
    <div class="icard-bot">
      <span style="font-family:var(--fm);font-size:10px;color:var(--ink-3)">Max:</span>
      <span class="char-c" id="cc">0</span>/1000
    </div>
  </div>

  <div class="ctrl">
    <button class="btn-run" id="btn-run" onclick="run()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span>Predict</span>
    </button>
    <button class="btn-ghost" onclick="clr()">Clear</button>
  </div>

  <div id="err"></div>

  <div class="legend">
    <div class="leg" style="color:#4d8eff;border-color:rgba(77,142,255,.25)"><div class="ldot" style="background:#4d8eff"></div>PRODUCT_NAME</div>
    <div class="leg" style="color:#9b6fff;border-color:rgba(155,111,255,.25)"><div class="ldot" style="background:#9b6fff"></div>PRODUCT_TYPE</div>
    <div class="leg" style="color:#00e87a;border-color:rgba(0,232,122,.25)"><div class="ldot" style="background:#00e87a"></div>PRICE</div>
    <div class="leg" style="color:#ff5e8e;border-color:rgba(255,94,142,.25)"><div class="ldot" style="background:#ff5e8e"></div>LOCATION</div>
  </div>

  <div class="progress" id="prog"></div>

  <div class="rgrid">
    <div class="panel" id="p1">
      <div class="pstripe" style="background:linear-gradient(90deg,#2563eb,#7c3aed)"></div>
      <div class="phead">
        <span class="pnum" style="background:rgba(77,142,255,.12);color:#4d8eff;border:1px solid rgba(77,142,255,.22)">M1</span>
        <span class="pname">⚡ PhoBERT</span>
        <span class="plat" id="lat1"></span>
      </div>
      <div class="pbody" id="body1">
        <div class="empty"><div class="eicon">🤖</div><p>Enter text and click <strong>Predict</strong></p></div>
      </div>
      <div class="pfoot" style="display:none" id="foot1">
        <div class="st"><span class="sk">Words</span><span class="sv b" id="tok1">0</span></div>
        <div class="st"><span class="sk">Entities</span><span class="sv b" id="ent1">0</span></div>
      </div>
    </div>

    <div class="panel" id="p2">
      <div class="pstripe" style="background:linear-gradient(90deg,#7c3aed,#a855f7)"></div>
      <div class="phead">
        <span class="pnum" style="background:rgba(155,111,255,.12);color:#9b6fff;border:1px solid rgba(155,111,255,.22)">M2</span>
        <span class="pname">⚙️ BiLSTM-CRF</span>
        <span class="plat" id="lat2"></span>
      </div>
      <div class="pbody" id="body2">
        <div class="empty"><div class="eicon">🤖</div><p>Enter text and click <strong>Predict</strong></p></div>
      </div>
      <div class="pfoot" style="display:none" id="foot2">
        <div class="st"><span class="sk">Words</span><span class="sv b" id="tok2">0</span></div>
        <div class="st"><span class="sk">Entities</span><span class="sv b" id="ent2">0</span></div>
      </div>
    </div>
  </div>
</div>

<script src="assets/script.js"></script>
</body>
</html>
